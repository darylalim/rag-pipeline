name: CI

on: push

# Cancel superseded runs on the same ref so only the latest push is tested.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and type checks are interpreter-independent, so they run once on a
  # single version rather than across the test matrix.
  lint:
    name: ruff + ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported and latest — the ends of requires-python.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      # --frozen installs exactly what's in uv.lock (no re-resolution).
      # The dev group (pytest) is included by default.
      - name: Install dependencies
        run: uv sync --frozen

      # Tests are fully offline (fake embedding + chat models), so no
      # ANTHROPIC_API_KEY / secrets are required.
      - name: Run tests
        run: uv run pytest
