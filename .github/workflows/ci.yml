name: CI

# `push` is unscoped so every branch gets CI immediately, not only once a PR is
# open — a branch that has been broken for six commits is worth knowing about
# before review.
#
# `pull_request` is still required, not decorative: a PR from a fork produces no
# push event in this repo, so without it a fork's changes would arrive for review
# with no CI signal at all. The `if:` on each job below is what stops a same-repo
# PR running everything twice.
on:
  push:
  pull_request:

# Neither job writes anything back to the repo; least privilege limits what a
# compromised dependency build backend could reach during `uv sync`.
permissions:
  contents: read

# Cancel superseded runs on the same ref so only the latest push/PR is tested.
# head_ref is set for pull_request events, ref for push.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# The rendered `name:` of each job below is what appears as a status check:
#
#     ruff + ty · pytest (py3.11) · pytest (py3.13)
#
# Nothing requires them at present — `main` carries no ruleset and takes direct
# pushes, so CI reports on a commit rather than gating it. Confirm with:
#     gh api repos/darylalim/rag-pipeline/rulesets
#
# If a gate is added back it matches these by exact string, so renaming a job or
# changing a matrix value has to happen in the same change as the rule. A rule
# matching no check still reads as configured while enforcing nothing, which is
# the failure worth remembering: a protection that appears active and is not.
#
# Both jobs carry the same `if:`. A same-repo PR branch already got a full run
# from its own push event on the identical SHA, so the pull_request run skips
# instead of repeating it — and a skipped check reports as passing, so this
# stays compatible with a required-checks gate if one returns. A fork PR has no
# push event here, so the condition is true and the checks run for real.
# Comparing `full_name` never reaches a shell -- it is an expression, not
# interpolation into `run:`.
jobs:
  # Lint and type checks are interpreter-independent, so they run once on a
  # single version rather than across the test matrix.
  lint:
    name: ruff + ty  # ← status check name
    if: >-
      github.event_name == 'push'
      || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"

      # ruff is a standalone binary and needs none of the project's dependencies,
      # so install just the dev group first — seconds, versus minutes for the ML
      # stack. A ruff failure then costs nothing further.
      #
      # --locked installs from uv.lock *and* asserts the lock is up to date with
      # pyproject.toml. --frozen would skip that check, so a dependency added by
      # hand without re-locking would silently never install and CI would pass.
      - name: Install lint tools
        run: uv sync --locked --only-group dev

      # --no-sync is load-bearing: a plain `uv run` re-syncs the full project
      # first, which would install torch and undo the step above.
      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Check formatting
        run: uv run --no-sync ruff format --check .

      # ty, unlike ruff, needs the real dependencies installed — it resolves
      # imports through them, and reports unresolved-import without them.
      - name: Install project dependencies
        run: uv sync --locked

      - name: Type check
        run: uv run ty check

  test:
    name: pytest (py${{ matrix.python-version }})  # ← status check name
    if: >-
      github.event_name == 'push'
      || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported and latest — the ends of requires-python.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      # --locked installs exactly what's in uv.lock and fails if the lock has
      # drifted from pyproject.toml (see the lint job for why not --frozen).
      # The dev group (pytest) is included by default.
      - name: Install dependencies
        run: uv sync --locked

      # Tests are fully offline (fake embedding + chat models), so no
      # ANTHROPIC_API_KEY / secrets are required.
      - name: Run tests
        run: uv run pytest
